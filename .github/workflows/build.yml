name: Validate and Build LLM Score

on:
  push:
    branches: [main, master, develop]
    paths:
      - "src/**"
      - "manifest.json"
      - "package.json"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main, master, develop]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Type-check
        run: npm run typecheck

      - name: Build extension
        run: npm run build

      - name: Validate extension
        run: npm run validate

      - name: Pack extension
        run: npm run pack

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: llm-score-${{ github.ref_name }}-${{ github.sha }}
          path: llm-score.zip
          retention-days: 30

  # This job runs on tag creation (e.g., v1.0.0)
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Pack extension
        run: npm run pack

      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: llm-score-${{ github.ref_name }}-${{ github.sha }}

      - name: Upload to Chrome Web Store
        run: npx chrome-webstore-upload upload --source ./llm-score.zip --extension-id ${{ secrets.EXTENSION_ID }}
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        continue-on-error: true

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: "Chrome extension build for ${{ github.ref }}"
          draft: false
          prerelease: false
